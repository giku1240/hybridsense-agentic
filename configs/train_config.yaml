# Chapter 4: DoRA Training Configurations (Optimized for 32GB vGPU)

model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
dataset_path: "data/processed/sft_train_data.jsonl"
output_dir: "models/hybrid-sense-dora"

# DoRA Parameters
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
use_dora: true  # Key parameter for Chapter 4

# Training Hyperparameters (Maximized for 32GB VRAM)
per_device_train_batch_size: 8  # Increased from 4 to 8 due to 32GB VRAM
gradient_accumulation_steps: 2  # Reduced since true batch size is larger (effective batch size = 16)
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
fp16: true
logging_steps: 10
save_strategy: "epoch"

# Quantization (4-bit NF4)
load_in_4bit: true
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true

